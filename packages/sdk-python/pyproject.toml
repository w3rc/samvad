[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "samvad"
version = "0.1.0"
description = "Python SDK for SAMVAD — The Open Sovereign Agent Dialogue Protocol"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Rupayan Samanta" }]
keywords = ["agents", "a2a", "protocol", "ed25519", "rfc9421"]
classifiers = [
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Libraries",
]
dependencies = [
  "cryptography>=42",
  "pydantic>=2.5",
  "httpx>=0.27",
  "starlette>=0.37",
  "sse-starlette>=2.1",
  "pyjwt[crypto]>=2.8",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.23",
  "ruff>=0.5",
  "mypy>=1.10",
  "asgi-lifespan>=2",
]

[project.urls]
Homepage = "https://github.com/rupayan-samanta/samvad"
Repository = "https://github.com/rupayan-samanta/samvad"

[tool.hatch.build.targets.wheel]
packages = ["src/samvad"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
